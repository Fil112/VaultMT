  # ==========================================================
# VaultMT - Конфигурация плагина
# ==========================================================

# Настройки валюты и экономики
economy:
  default-currency: "mt" # Валюта по умолчанию (если игрок не указал её в команде)
  start-balance: 100.0
  transfer-fee: 0.05 # Это комиссия 5% на переводы. Поставь 0.0, если комиссия не нужна.
  currencies:
    mt:
      name: "Монеты"
      symbol: "$"
      allow-pay: true # Разрешить переводы между игроками
      fee: 0.05 # Комиссия 5%
    donate:
      name: "Рубины"
      symbol: "dnt"
      allow-pay: false # ЗАПРЕТИТЬ переводы (донат-валюта)
      fee: 0.0

# Новая секция: Выбор базы данных
storage:
  # Типы: sqlite (файл), mysql (удаленная БД)
  type: "sqlite"

  # Настройки для MySQL (активны только если type: mysql)
  mysql:
    host: "localhost"
    port: 3306
    database: "vaultmt_db"
    username: "root"
    password: "password"
    use-ssl: false

  # Параметры производительности
  save-interval: 300 # Интервал сохранения данных
  async-mode: true # true = работа в фоне (рекомендуется)

# Настройки интеграции и API
api:
  # Если true, плагин будет пытаться использовать Vault API
  enable-vault-hook: true
  # Если true, будет включена поддержка PlaceholderAPI
  enable-papi: true

  # Тип провайдера: auto (автовыбор), internal (собственная база), essentials (адаптер)
  provider-type: "auto"

# Общие настройки и локализация
settings:
  language: "ru_RU"
  check-updates: true
  debug: false