# ==========================================================
# VaultMT - Конфигурация плагина
# ==========================================================

# Настройки валюты и экономики
economy:
  start-balance: 100.0
  currency:
    name: "монета"
    plural: "монет"
    symbol: "mt"
    format: "%.2f %s"

# Новая секция: Выбор базы данных
storage:
  # Типы: sqlite (файл), mysql (удаленная БД)
  type: "sqlite"

  # Настройки для MySQL (активны только если type: mysql)
  mysql:
    host: "localhost"
    port: 3306
    database: "vaultmt_db"
    username: "root"
    password: "password"
    use-ssl: false

  # Параметры производительности
  save-interval: 300 # Интервал сохранения данных
  async-mode: true # true = работа в фоне (рекомендуется)

# Настройки интеграции и API
api:
  # Если true, плагин будет пытаться использовать Vault API
  enable-vault-hook: true
  # Если true, будет включена поддержка PlaceholderAPI
  enable-papi: true

  # Тип провайдера: auto (автовыбор), internal (собственная база), essentials (адаптер)
  provider-type: "auto"

# Общие настройки и локализация
settings:
  language: "ru_RU"
  check-updates: true
  debug: false