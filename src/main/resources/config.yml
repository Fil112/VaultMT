# Настройки VaultMT
# Конфигурация экономики и поведения плагина

economy:
  # Начальный баланс при первом входе игрока
  start-balance: 100.0

  # Настройки отображения валюты
  currency:
    name: "монета"
    plural: "монет"
    symbol: "mt"
    format: "%.2f %s" # Форматирование вывода (сумма + валюта)

  # Тип провайдера: auto (автовыбор), internal (собственная база), essentials (адаптер)
  provider-type: "auto"

# Настройки сохранения данных
storage:
  # Интервал автосохранения (в секундах)
  save-interval: 300
  # Использовать ли синхронное сохранение (может вызвать лаги на больших серверах)
  sync-save: false

# Общие настройки
settings:
  # Режим отладки (вывод подробных логов в консоль)
  debug: false
  # Проверка обновлений
  check-updates: true
  # Язык сообщений (файл локализации)
  language: "ru_RU"