# ==========================================================
# VaultMT - Конфигурация плагина
# ==========================================================

# Настройки валюты и экономики
economy:
  default-currency: "mt" # Валюта по умолчанию (если игрок не указал её в команде)
  start-balance: 100.0
  transfer-fee: 0.05 # Это комиссия 5% на переводы. Поставь 0.0, если комиссия не нужна.
  dynamic-tax: # Система динамического налога
    enabled: true
    default-rate: 0.01 # Налог 1% на суммы меньше первого порога
    brackets: # Формат порогов: "минимальная_сумма:ставка_налога" (сортируй от меньшего к большему)
      - "1000:0.02"    # От 1 000$ налог становится 2%
      - "5000:0.05"    # От 5 000$ налог становится 5%
      - "25000:0.10"   # От 25 000$ налог становится 10%
  currencies:
    mt:
      name: "Монеты"
      symbol: "$"
      allow-pay: true # Разрешить переводы между игроками
      fee: 0.05 # Комиссия 5%
    donate:
      name: "Рубины"
      symbol: "dnt"
      allow-pay: false # ЗАПРЕТИТЬ переводы (донат-валюта)
      fee: 0.0
  limits:
    min-pay: 1.0
    max-pay: 100000.0

  # Черный список игроков, которым запрещено отправлять и получать переводы
blacklist:
  - "ScammerPlayer1"
  - "DupeMaster99"

# Выбор базы данных
storage:
  database:
    type: "sqlite" # Типы: sqlite (файл), mysql (удаленная БД)
    mysql:
      host: "localhost"
      port: "3306"
      database: "vaultmt"
      username: "root"
      password: "password123"
      use-ssl: false

  # Параметры производительности
  save-interval: 300 # Интервал сохранения данных
  async-mode: true # true = работа в фоне (рекомендуется)

# Настройки интеграции и API
api:
  # Если true, плагин будет пытаться использовать Vault API
  enable-vault-hook: true
  # Если true, будет включена поддержка PlaceholderAPI
  enable-papi: true

  # Тип провайдера: auto (автовыбор), internal (собственная база), essentials (адаптер)
  provider-type: "auto"

# Общие настройки и локализация
settings:
  language: "ru_RU"
  check-updates: true
  debug: false