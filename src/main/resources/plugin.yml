name: VaultMT
version: '${version}'
main: mt.vault.core.VaultMTP
api-version: '26.1'
load: POSTWORLD
authors: [ Keylo ]
description: Core economy plugin and API with Folia support.
website: https://github.com/Keylo/VaultMT
folia-supported: true
prefix: mt

commands:
  emt:                    # Сюда пишем основную команду
    description: Основная команда плагина.
    usage: /emt <команда>
    permission: vaultmt.admin

permissions:
  vaultmt.admin:
    description: Полный доступ ко всем командам VaultMT.
    default: op