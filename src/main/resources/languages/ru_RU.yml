    pay-success-fee: "&aВы успешно перевели &e{amount}$ &fигроку &b{player} &7(Удержана комиссия: {fee}$)"
    pay-success: "&aВы успешно перевели &e{amount}$ &fигроку &b{player}"
    pay-received: "&aИгрок &b{player} &aперевел вам &e{amount}$"
    pay-refunded: "&cОшибка перевода! Деньги возвращены на ваш счет."
    pay-fail: "&cНе удалось списать средства с вашего счета: {error}"

    # Логи
    log-usage: "&cИспользование: /emt log <игрок> [страница]"
    page-not-number: "&cНомер страницы должен быть числом!"
