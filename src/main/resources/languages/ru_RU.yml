    no-amount: "&cСумма не может быть отрицательной!"
    player-never-played: "&cИгрок &e{player} &cникогда не заходил на сервер!"
    console-needs-player: "&cКонсоль должна указывать ник игрока: /emt balance <игрок>"

    # Транзакции администратора (отправителю)
    give-sender: "&aВы выдали &e{amount}$ &fигроку &b{player}"
    set-sender: "&aВы установили баланс &e{amount}$ &fигроку &b{player}"
    take-sender: "&aВы забрали &e{amount}$ &fу игрока &b{player}"
    take-insufficient: "&cУ игрока недостаточно средств! Текущий баланс: &e{balance}$"
    transaction-error: "&cПроизошла ошибка при операции: {error}"

    # Транзакции администратора (цели)
    give-target: "&aВам выдано &e{amount}$"
    set-target: "&6Ваш баланс административно установлен на &e{amount}$"
    take-target: "&cАдминистратор изъял у вас &e{amount}$"

    # Баланс
    balance-check: "&eБаланс &b{player}&e: &a{balance}$"

    # Переводы (Pay)
    pay-usage: "&cИспользование: /emt pay <игрок> <сумма>"
    pay-zero: "&cСумма перевода должна быть больше нуля!"
    pay-self: "&cВы не можете перевести деньги самому себе!"
