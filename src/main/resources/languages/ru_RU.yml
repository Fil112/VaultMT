    log-header: "&7=== &eЛоги игрока {player} (Стр {page}) &7==="
    log-empty: "&cЗаписей не найдено."

    # Команда /emt stats
    stats-title: "&7================ &eСтатистика EMT &7================"
    stats-accounts: "&fАктивных счетов: &e{count}"
    stats-total: "&fВсего монет в обороте: &e{total}$"
    stats-richest: "&fСамый богатый игрок: &b{player} &f(&e{balance}$&f)"
    stats-footer: "&7=================================================="

    # Команда /emt help
    help-header: "&7================ &eПомощь EMT &7================"
    help-balance: "&e/emt balance [игрок] &7— Узнать баланс"
    help-pay: "&e/emt pay <игрок> <сумма> &7— Перевести деньги игроку"
    help-stats: "&e/emt stats &7— Показать экономическую статистику сервера"
    help-give: "&e/emt give <игрок> <сумма> &7— Выдать монеты игроку"
    help-take: "&e/emt take <игрок> <сумма> &7— Забрать монеты у игрока"
    help-set: "&e/emt set <игрок> <сумма> &7— Установить точный баланс"
    help-log: "&e/emt log <игрок> &7— Посмотреть историю транзакций"
    help-version: "&e/emt version &7— Показать версию плагина"
    help-reload: "&e/emt reload &7— Перезагрузить конфигурацию плагина"
    help-footer: "&7========================================="

    # Максимальная сумма перевода
    pay-min-limit: "§cМинимальная сумма перевода: §e{min}$"
    pay-max-limit: "§cМаксимальная сумма перевода: §e{max}$"

    # Черный список
    pay-blacklisted-sender: "§cВаши финансовые операции заблокированы администрацией!"
    pay-blacklisted-target: "§cИгрок §b{player} §cнаходится в черном списке для переводов!"